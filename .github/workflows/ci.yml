name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: Core / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install core and development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Reject fatal lint errors
        run: python -m ruff check .
      - name: Run core suite
        run: python -m pytest --ignore=tests/test_dashboard_streamlit.py --ignore=tests/test_dashboard_shiny.py
      - name: Build distribution
        run: python -m build
      - name: Verify installed import outside source tree
        working-directory: ${{ runner.temp }}
        run: python -c "import rates_risk; print(rates_risk.__file__)"

  dashboards:
    name: Optional dashboards / Python 3.12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install all optional dependencies
        run: python -m pip install -e ".[dev,all]"
      - name: Run dashboard tests
        run: python -m pytest tests/test_dashboard_streamlit.py tests/test_dashboard_shiny.py
